<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广东省安徽宣城商会 - 管理后台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%); }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 400px; }
        .login-title { text-align: center; color: #c41e3a; margin-bottom: 30px; font-size: 24px; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #001529; color: white; }
        .sidebar-title { padding: 20px; text-align: center; background: #c41e3a; font-size: 18px; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #002140; transition: background 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: #c41e3a; }
        .main-content { flex: 1; padding: 20px; }
        .header { background: white; padding: 15px 20px; margin-bottom: 20px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .content-card { background: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .stat-number { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div v-if="!isLoggedIn" class="login-container">
            <div class="login-box">
                <h1 class="login-title">🏛️ 管理后台登录</h1>
                <el-form :model="loginForm" label-width="80px">
                    <el-form-item label="用户名">
                        <el-input v-model="loginForm.username" placeholder="请输入用户名"></el-input>
                    </el-form-item>
                    <el-form-item label="密码">
                        <el-input v-model="loginForm.password" type="password" placeholder="请输入密码" @keyup.enter="handleLogin"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="danger" style="width: 100%" @click="handleLogin" :loading="loading">登录</el-button>
                    </el-form-item>
                </el-form>
            </div>
        </div>

        <!-- 管理后台主界面 -->
        <div v-else class="admin-layout">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-title">🏛️ 商会管理后台</div>
                <ul class="sidebar-menu">
                    <li :class="{active: currentPage==='dashboard'}" @click="currentPage='dashboard'">📊 仪表盘</li>
                    <li :class="{active: currentPage==='news'}" @click="currentPage='news'">📰 新闻管理</li>
                    <li :class="{active: currentPage==='events'}" @click="currentPage='events'">📅 活动管理</li>
                    <li :class="{active: currentPage==='members'}" @click="currentPage='members'">💼 会员管理</li>
                    <li :class="{active: currentPage==='applications'}" @click="currentPage='applications'">📋 入会申请</li>
                    <li :class="{active: currentPage==='settings'}" @click="currentPage='settings'">⚙️ 网站配置</li>
                </ul>
            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <div class="header">
                    <h2>{{ pageTitle }}</h2>
                    <el-button @click="handleLogout">退出登录</el-button>
                </div>

                <!-- 仪表盘 -->
                <div v-if="currentPage==='dashboard'" class="content-card">
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-number">{{ stats.news }}</div>
                            <div class="stat-label">新闻总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">{{ stats.events }}</div>
                            <div class="stat-label">活动数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">{{ stats.members }}</div>
                            <div class="stat-label">会员企业</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">{{ stats.pending }}</div>
                            <div class="stat-label">待审核申请</div>
                        </div>
                    </div>
                    <h3>📈 最近动态</h3>
                    <el-timeline style="margin-top: 20px">
                        <el-timeline-item v-for="item in recentNews" :key="item.title" :timestamp="item.created_at" placement="top">
                            {{ item.title }}
                        </el-timeline-item>
                    </el-timeline>
                    <div v-if="recentNews.length===0" class="empty-state">暂无动态</div>
                </div>

                <!-- 新闻管理 -->
                <div v-if="currentPage==='news'" class="content-card">
                    <el-button type="danger" @click="showNewsDialog=true">➕ 发布新闻</el-button>
                    <el-table :data="newsList" style="margin-top: 20px">
                        <el-table-column prop="title" label="标题" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="publish_date" label="发布日期" width="120"></el-table-column>
                        <el-table-column prop="status" label="状态" width="100">
                            <template #default="{row}">
                                <el-tag :type="row.status==='published'?'success':'info'">{{ row.status }}</el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="100">
                            <template #default="{row}">
                                <el-button size="small" type="danger" @click="deleteNews(row.id)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div v-if="newsList.length===0" class="empty-state">暂无新闻</div>
                </div>

                <!-- 活动管理 -->
                <div v-if="currentPage==='events'" class="content-card">
                    <el-table :data="eventsList">
                        <el-table-column prop="title" label="活动名称" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="location" label="地点" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="start_time" label="开始时间" width="180"></el-table-column>
                        <el-table-column prop="status" label="状态" width="100">
                            <template #default="{row}">
                                <el-tag :type="row.status==='upcoming'?'success':'warning'">{{ row.status }}</el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="100">
                            <template #default="{row}">
                                <el-button size="small" @click="viewRegistrations(row.id)">查看报名</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div v-if="eventsList.length===0" class="empty-state">暂无活动</div>
                </div>

                <!-- 会员管理 -->
                <div v-if="currentPage==='members'" class="content-card">
                    <el-table :data="membersList">
                        <el-table-column prop="company_name" label="企业名称" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="industry" label="行业" width="100"></el-table-column>
                        <el-table-column prop="contact_person" label="联系人" width="100"></el-table-column>
                        <el-table-column prop="position" label="职位" width="100"></el-table-column>
                        <el-table-column prop="status" label="状态" width="80">
                            <template #default="{row}">
                                <el-tag type="success">{{ row.status }}</el-tag>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div v-if="membersList.length===0" class="empty-state">暂无会员</div>
                </div>

                <!-- 入会申请 -->
                <div v-if="currentPage==='applications'" class="content-card">
                    <el-table :data="applicationsList">
                        <el-table-column prop="company_name" label="企业名称" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="applicant_name" label="申请人" width="100"></el-table-column>
                        <el-table-column prop="phone" label="手机" width="130"></el-table-column>
                        <el-table-column prop="city" label="家乡" width="100"></el-table-column>
                        <el-table-column prop="status" label="状态" width="80">
                            <template #default="{row}">
                                <el-tag :type="row.status==='pending'?'warning':(row.status==='approved'?'success':'danger')">{{ row.status }}</el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="150">
                            <template #default="{row}">
                                <el-button size="small" type="success" @click="updateApplicationStatus(row.id, 'approved')">通过</el-button>
                                <el-button size="small" type="danger" @click="updateApplicationStatus(row.id, 'rejected')">拒绝</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div v-if="applicationsList.length===0" class="empty-state">暂无申请</div>
                </div>

                <!-- 网站配置 -->
                <div v-if="currentPage==='settings'" class="content-card">
                    <el-form :model="settings" label-width="120px">
                        <el-form-item label="网站名称">
                            <el-input v-model="settings.site_name"></el-input>
                        </el-form-item>
                        <el-form-item label="联系电话">
                            <el-input v-model="settings.site_phone"></el-input>
                        </el-form-item>
                        <el-form-item label="联系邮箱">
                            <el-input v-model="settings.site_email"></el-input>
                        </el-form-item>
                        <el-form-item label="地址">
                            <el-input v-model="settings.site_address" type="textarea" :rows="3"></el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="danger" @click="saveSettings">保存配置</el-button>
                        </el-form-item>
                    </el-form>
                </div>
            </div>
        </div>

        <!-- 发布新闻对话框 -->
        <el-dialog v-model="showNewsDialog" title="发布新闻" width="600px">
            <el-form :model="newsForm" label-width="80px">
                <el-form-item label="标题">
                    <el-input v-model="newsForm.title" placeholder="请输入新闻标题"></el-input>
                </el-form-item>
                <el-form-item label="内容">
                    <el-input v-model="newsForm.content" type="textarea" :rows="5" placeholder="请输入新闻内容"></el-input>
                </el-form-item>
                <el-form-item label="来源链接">
                    <el-input v-model="newsForm.source_url" placeholder="请输入来源链接（如微信公众号文章链接）"></el-input>
                </el-form-item>
                <el-form-item label="发布日期">
                    <el-input v-model="newsForm.publish_date" placeholder="请输入日期，如：2026-03-21"></el-input>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="showNewsDialog=false">取消</el-button>
                <el-button type="danger" @click="createNews">发布</el-button>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    isLoggedIn: false,
                    token: null,
                    loading: false,
                    currentPage: 'dashboard',
                    loginForm: { username: '', password: '' },
                    stats: { news: 0, events: 0, members: 0, pending: 0 },
                    recentNews: [],
                    newsList: [],
                    eventsList: [],
                    membersList: [],
                    applicationsList: [],
                    settings: {},
                    showNewsDialog: false,
                    newsForm: { title: '', content: '', source_url: '', publish_date: '' }
                }
            },
            computed: {
                pageTitle() {
                    const titles = {
                        dashboard: '📊 仪表盘',
                        news: '📰 新闻管理',
                        events: '📅 活动管理',
                        members: '💼 会员管理',
                        applications: '📋 入会申请',
                        settings: '⚙️ 网站配置'
                    };
                    return titles[this.currentPage];
                }
            },
            methods: {
                async apiRequest(endpoint, options = {}) {
                    const headers = { 'Content-Type': 'application/json', ...options.headers };
                    if (this.token) headers['Authorization'] = this.token;
                    const res = await fetch(endpoint, { ...options, headers });
                    return res.json();
                },
                async handleLogin() {
                    this.loading = true;
                    try {
                        const data = await this.apiRequest('/api/auth/login', {
                            method: 'POST',
                            body: JSON.stringify(this.loginForm)
                        });
                        if (data.success) {
                            this.token = data.token;
                            this.isLoggedIn = true;
                            this.loadData();
                            ElementPlus.ElMessage.success('登录成功');
                        } else {
                            ElementPlus.ElMessage.error(data.error);
                        }
                    } catch (e) {
                        ElementPlus.ElMessage.error('登录失败，请检查网络连接');
                    } finally {
                        this.loading = false;
                    }
                },
                handleLogout() {
                    this.isLoggedIn = false;
                    this.token = null;
                },
                async loadData() {
                    try {
                        // 加载仪表盘数据
                        const dashboard = await this.apiRequest('/api/dashboard');
                        this.stats = dashboard.stats;
                        this.recentNews = dashboard.recent_news;
                        
                        // 加载各模块数据
                        this.newsList = await this.apiRequest('/api/news');
                        this.eventsList = await this.apiRequest('/api/events');
                        this.membersList = await this.apiRequest('/api/members');
                        this.applicationsList = await this.apiRequest('/api/applications');
                        this.settings = await this.apiRequest('/api/settings');
                    } catch (e) {
                        ElementPlus.ElMessage.error('加载数据失败');
                    }
                },
                async deleteNews(id) {
                    await this.apiRequest(`/api/news/${id}`, { method: 'DELETE' });
                    this.loadData();
                    ElementPlus.ElMessage.success('删除成功');
                },
                async createNews() {
                    await this.apiRequest('/api/news', {
                        method: 'POST',
                        body: JSON.stringify(this.newsForm)
                    });
                    this.showNewsDialog = false;
                    this.newsForm = { title: '', content: '', source_url: '', publish_date: '' };
                    this.loadData();
                    ElementPlus.ElMessage.success('发布成功');
                },
                async updateApplicationStatus(id, status) {
                    await this.apiRequest(`/api/applications/${id}/status`, {
                        method: 'PUT',
                        body: JSON.stringify({ status })
                    });
                    this.loadData();
                    ElementPlus.ElMessage.success('审核完成');
                },
                async saveSettings() {
                    await this.apiRequest('/api/settings', {
                        method: 'PUT',
                        body: JSON.stringify(this.settings)
                    });
                    ElementPlus.ElMessage.success('保存成功');
                },
                viewRegistrations(eventId) {
                    ElementPlus.ElMessage.info('查看活动报名：' + eventId);
                }
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
